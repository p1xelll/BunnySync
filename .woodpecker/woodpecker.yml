# Woodpecker CI pipeline for bunnysync

when:
  - event: push
    branch: main
  - event: pull_request
  - event: tag

steps:
  fmt:
    image: rust:1.86-slim-bookworm
    commands:
      - rustup component add rustfmt
      - cargo fmt --check

  lint:
    image: rust:1.86-slim-bookworm
    commands:
      - apt-get update && apt-get install -y pkg-config libssl-dev cmake git
      - rustup component add clippy
      - cargo clippy -- -D warnings
    depends_on: [fmt]

  test:
    image: rust:1.86-slim-bookworm
    commands:
      - apt-get update && apt-get install -y pkg-config libssl-dev cmake git
      - cargo test --release
    depends_on: [lint]
