# Woodpecker CI pipeline for bunnysync
# Builds multi-arch Docker images (amd64 + arm64) and pushes to Docker Hub

when:
  - event: push
    branch: main
  - event: pull_request
  - event: tag

variables:
  - &registry docker.io
  - &repo "${CI_REPO_OWNER}/bunnysync"

steps:
  # === QUALITY CHECKS ===

  fmt:
    image: rust:1.86-slim-bookworm
    commands:
      - rustup component add rustfmt
      - cargo fmt --check

  lint:
    image: rust:1.86-slim-bookworm
    commands:
      - apt-get update && apt-get install -y pkg-config libssl-dev cmake git
      - rustup component add clippy
      - cargo clippy -- -D warnings
    depends_on: [fmt]

  test:
    image: rust:1.86-slim-bookworm
    commands:
      - apt-get update && apt-get install -y pkg-config libssl-dev cmake git
      - cargo test --release
    depends_on: [lint]

  # === PR BUILDS (dry run) ===

  build-pr:
    image: woodpeckerci/plugin-docker-buildx
    settings:
      repo: *repo
      dockerfile: Dockerfile
      context: .
      platforms: linux/amd64,linux/arm64
      dry_run: true
      buildkit: true
    when:
      - event: pull_request
    depends_on: [test]

  # === PRODUCTION BUILDS ===

  build-amd64:
    image: woodpeckerci/plugin-docker-buildx
    settings:
      repo: *repo
      dockerfile: Dockerfile
      context: .
      platforms: linux/amd64
      tag: ${CI_COMMIT_SHA:0:8}-amd64
      buildkit: true
      build_args:
        - BUILDKIT_INLINE_CACHE=1
      username:
        from_secret: docker_username
      password:
        from_secret: docker_password
    when:
      - event: [push, tag]
    depends_on: [test]

  build-arm64:
    image: woodpeckerci/plugin-docker-buildx
    settings:
      repo: *repo
      dockerfile: Dockerfile
      context: .
      platforms: linux/arm64
      tag: ${CI_COMMIT_SHA:0:8}-arm64
      buildkit: true
      build_args:
        - BUILDKIT_INLINE_CACHE=1
      username:
        from_secret: docker_username
      password:
        from_secret: docker_password
    when:
      - event: [push, tag]
    depends_on: [test]

  # === MANIFEST LISTS ===

  manifest-sha:
    image: woodpeckerci/plugin-docker-buildx
    settings:
      repo: *repo
      tag: ${CI_COMMIT_SHA:0:8}
      platforms: linux/amd64,linux/arm64
      manifest: true
      username:
        from_secret: docker_username
      password:
        from_secret: docker_password
    when:
      - event: [push, tag]
    depends_on: [build-amd64, build-arm64]

  manifest-latest:
    image: woodpeckerci/plugin-docker-buildx
    settings:
      repo: *repo
      tag: latest
      platforms: linux/amd64,linux/arm64
      manifest: true
      username:
        from_secret: docker_username
      password:
        from_secret: docker_password
    when:
      - event: push
        branch: main
    depends_on: [build-amd64, build-arm64]

  manifest-version:
    image: woodpeckerci/plugin-docker-buildx
    settings:
      repo: *repo
      tag: ${CI_COMMIT_TAG}
      platforms: linux/amd64,linux/arm64
      manifest: true
      username:
        from_secret: docker_username
      password:
        from_secret: docker_password
    when:
      - event: tag
    depends_on: [build-amd64, build-arm64]
