services:
  bunnysync:
    image: p1xel/bunnysync:latest
    build: .
    ports:
      - "3000:3000"
    environment:
      # Global settings
      BIND_ADDR: "0.0.0.0:3000"
      BUNNY_API_KEY: "your-bunny-api-key"

      # Project 1:
      PROJECT_BLOG_REPO_URL: "https://codeberg.org/user/blog.git"
      PROJECT_BLOG_WEBHOOK_SECRET: "your-webhook-secret-min-32-chars-long"
      PROJECT_BLOG_BUNNY_STORAGE_ZONE: "zone"
      PROJECT_BLOG_BUNNY_STORAGE_ZONE_ID: "12345"
      PROJECT_BLOG_BUNNY_STORAGE_PASSWORD: "your-storage-password"
      PROJECT_BLOG_BUNNY_PULL_ZONE_ID: "111111"
      PROJECT_BLOG_BUNNY_PULL_ZONE_DOMAIN: "bunny.b-cdn.net"

      # Project 2: (optional - add more projects as needed)
      # PROJECT_DOCS_REPO_URL: "https://codeberg.org/user/docs.git"
      # PROJECT_DOCS_WEBHOOK_SECRET: "another-secret-min-32-chars-long"
      # PROJECT_DOCS_BUNNY_STORAGE_ZONE: "zone2"
      # PROJECT_DOCS_BUNNY_STORAGE_ZONE_ID: "67890"
      # PROJECT_DOCS_BUNNY_STORAGE_PASSWORD: "another-storage-password"
      # PROJECT_DOCS_BUNNY_PULL_ZONE_ID: "222222"
      # PROJECT_DOCS_BUNNY_PULL_ZONE_DOMAIN: "bunny2.b-cdn.net"
      # PROJECT_DOCS_BUNNY_API_KEY: "optional-project-specific-api-key"

    restart: unless-stopped
